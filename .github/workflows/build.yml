name: Build BypassRiskPlugin.dylib

on:
  push:
    branches: [ "main" ]
    paths:
      - 'BypassRiskProject/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'BypassRiskProject/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.1.app 2>/dev/null || true

      - name: Install Theos dependencies
        run: |
          brew install ldid xz coreutils

      - name: Cache Theos toolchain
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: |
            ~/theos
            ~/theos/sdks
          key: ${{ runner.os }}-theos-sdk18.6

      - name: Install Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          set -e
          git config --global advice.detachedHead false
          echo "::group::Cloning Theos"
          git clone --recursive --depth=1 https://github.com/theos/theos.git ~/theos
          echo "::endgroup::"
          echo "::group::Downloading iOS SDK"
          mkdir -p ~/theos/sdks
          SDK_URL="https://github.com/xybp888/iOS-SDKs/releases/download/iOS18.6-SDKs/iPhoneOS18.6.sdk.zip"
          echo "Downloading SDK from: $SDK_URL"
          curl -L -o /tmp/iPhoneOS18.6.sdk.zip "$SDK_URL"
          # Validate download is a valid zip
          DOWNLOAD_SIZE=$(stat -f%z /tmp/iPhoneOS18.6.sdk.zip 2>/dev/null || stat --format=%s /tmp/iPhoneOS18.6.sdk.zip 2>/dev/null || echo "0")
          echo "Downloaded size: $DOWNLOAD_SIZE bytes"
          if [ "$DOWNLOAD_SIZE" -lt 1000000 ]; then
            echo "ERROR: SDK download is too small ($DOWNLOAD_SIZE bytes). File may not exist."
            exit 1
          fi
          echo "Extracting SDK..."
          unzip -q /tmp/iPhoneOS18.6.sdk.zip -d ~/theos/sdks/
          echo "SDK installed at:"
          ls -la ~/theos/sdks/
          echo "::endgroup::"

      - name: Build dylib
        run: |
          export THEOS=~/theos
          cd BypassRiskProject
          make clean 2>/dev/null || true
          make
          echo "=== Build complete ==="
          find .theos -name "*.dylib" 2>/dev/null

      - name: Locate and prepare dylib artifact
        run: |
          export THEOS=~/theos
          echo "=== Build output tree ==="
          find BypassRiskProject/.theos -name "*.dylib" -type f 2>/dev/null || true
          mkdir -p /tmp/artifact
          find BypassRiskProject/.theos -name "BypassRiskPlugin.dylib" -type f -exec cp {} /tmp/artifact/ \; 2>/dev/null || true
          ls -la /tmp/artifact/ 2>/dev/null || echo "No artifacts found"

      - name: Upload compiled dylib
        uses: actions/upload-artifact@v4
        with:
          name: BypassRiskPlugin-dylib
          path: /tmp/artifact/BypassRiskPlugin.dylib
          if-no-files-found: error